name: Release

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish the npm package after checks pass
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  npm:
    name: Npm Package
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Update Npm
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Verify Package Contents
        run: npm pack --dry-run

      - name: Publish To Npm
        if: ${{ github.event.inputs.publish_npm == 'true' }}
        run: npm publish --access public --provenance
