name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: Test, Lint, And Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Dependencies
        run: npm ci

      - name: Check
        run: npm run check
