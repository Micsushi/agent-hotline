<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kokoro TTS test</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #14181c;
        color: #e6edf3;
        margin: 0;
        padding: 24px;
      }
      h1 {
        font-size: 18px;
      }
      textarea {
        width: 100%;
        height: 90px;
        background: #0e1216;
        color: #e6edf3;
        border: 1px solid #2a323b;
        border-radius: 8px;
        padding: 10px;
        font: inherit;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        margin: 12px 0;
        flex-wrap: wrap;
      }
      button {
        background: #b6f24a;
        color: #11150a;
        border: 0;
        border-radius: 8px;
        padding: 10px 18px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      select {
        background: #0e1216;
        color: #e6edf3;
        border: 1px solid #2a323b;
        border-radius: 8px;
        padding: 8px;
      }
      #log {
        white-space: pre-wrap;
        background: #0e1216;
        border: 1px solid #2a323b;
        border-radius: 8px;
        padding: 12px;
        margin-top: 12px;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        min-height: 80px;
      }
      .pill {
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 999px;
        background: #2a323b;
      }
    </style>
  </head>
  <body>
    <h1>Kokoro TTS test <span id="device" class="pill">device: ?</span></h1>
    <textarea id="text">
Here is a longer test of the new voice. I have cleaned up the queue and I will read this aloud so you can judge how natural it sounds. This is the local Kokoro model running on your GPU.</textarea
    >
    <div class="row">
      <label
        >Device
        <select id="deviceSel">
          <option value="webgpu">webgpu (GPU)</option>
          <option value="wasm">wasm (CPU)</option>
        </select>
      </label>
      <label
        >Voice
        <select id="voice"></select
      ></label>
      <button id="load">1. Load model</button>
      <button id="speak" disabled>2. Generate &amp; play</button>
    </div>
    <audio id="player" controls style="width: 100%"></audio>
    <div id="log"></div>

    <script type="module">
      const logEl = document.getElementById("log");
      const log = (m) => {
        logEl.textContent += m + "\n";
        console.log(m);
      };
      const t0 = () => performance.now();
      const ms = (s) => `${Math.round(performance.now() - s)}ms`;

      let tts = null;

      document.getElementById("load").addEventListener("click", async () => {
        const btn = document.getElementById("load");
        btn.disabled = true;
        const device = document.getElementById("deviceSel").value;
        document.getElementById("device").textContent = "device: " + device;
        try {
          log(`Importing kokoro-js...`);
          const { KokoroTTS } = await import("kokoro-js");
          log(`Loading model on ${device} (first run downloads ~80-300MB)...`);
          const s = t0();
          tts = await KokoroTTS.from_pretrained("onnx-community/Kokoro-82M-v1.0-ONNX", {
            dtype: device === "webgpu" ? "fp32" : "q8",
            device
          });
          log(`Model loaded in ${ms(s)}`);
          const voiceSel = document.getElementById("voice");
          const voices = Object.keys(tts.voices || {});
          voiceSel.innerHTML = voices.map((v) => `<option value="${v}">${v}</option>`).join("");
          if (voices.includes("af_heart")) voiceSel.value = "af_heart";
          log(`Voices available: ${voices.length}`);
          document.getElementById("speak").disabled = false;
        } catch (e) {
          log(`LOAD ERROR: ${e?.message || e}`);
          console.error(e);
          btn.disabled = false;
        }
      });

      document.getElementById("speak").addEventListener("click", async () => {
        const btn = document.getElementById("speak");
        btn.disabled = true;
        try {
          const text = document.getElementById("text").value;
          const voice = document.getElementById("voice").value;
          log(`Generating (voice=${voice})...`);
          const s = t0();
          const audio = await tts.generate(text, { voice });
          log(`Generated in ${ms(s)}`);
          const blob = audio.toBlob();
          const url = URL.createObjectURL(blob);
          const player = document.getElementById("player");
          player.src = url;
          await player.play();
          log(`Playing.`);
        } catch (e) {
          log(`SPEAK ERROR: ${e?.message || e}`);
          console.error(e);
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
